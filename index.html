<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شحن باقات الموبايل</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --main: #e60000;
    --gray: #f5f5f5;
    --text: #333;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    background: var(--gray);
    color: var(--text);
}

/* HEADER */
.header {
    background: white;
    padding: 20px 30px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 800;
    color: var(--main);
    font-size: 20px;
}

.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.hero p {
    color: #666;
}

/* SECTIONS */
.section {
    padding: 30px 20px;
}

.section-title {
    font-size: 22px;
    margin-bottom: 20px;
    font-weight: 700;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(230px,1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
    transition: 0.2s;
}

.card:hover {
    border-color: var(--main);
}

.card h3 {
    font-size: 18px;
}

.card p {
    color: #666;
    font-size: 14px;
    margin: 5px 0;
}

.price {
    margin: 10px 0;
    font-size: 20px;
    color: var(--main);
    font-weight: bold;
}

.btn {
    width: 100%;
    padding: 10px;
    border: none;
    background: var(--main);
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    opacity: 0.9;
}

/* PAYMENT */
.payment {
    display: none;
    max-width: 400px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
}

.selected {
    background: #fff0f0;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.copy-box {
    display: flex;
    gap: 10px;
}

.success {
    display: none;
    background: #e6ffe6;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Vodafone Services</div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>اشحن باقتك في ثواني ⚡</h1>
    <p>اختار الباقة المناسبة وحوّل واحنا نفعلها فورًا</p>
</div>

<!-- Vodafone -->
<div class="section">
<div class="section-title">🔴 فودافون</div>

<div class="cards">

<div class="card">
<h3>40 جيجا + 7500 وحدة</h3>
<p>لمدة 3 شهور</p>
<div class="price">125 جنيه</div>
<button class="btn" onclick="order('فودافون 40 جيجا')">اطلب الآن</button>
</div>

<div class="card">
<h3>32 جيجا + 9000 وحدة</h3>
<p>لمدة شهرين</p>
<div class="price">105 جنيه</div>
<button class="btn" onclick="order('فودافون 32 جيجا')">اطلب الآن</button>
</div>

</div>
</div>

<!-- PAYMENT -->
<div class="payment" id="pay">

<div class="selected" id="selected"></div>

<h3>الدفع عبر فودافون كاش</h3>

<div class="copy-box">
<input type="text" value="0023363476" id="num" readonly>
<button onclick="copy()">نسخ</button>
</div>

<input type="text" placeholder="رقم الموبايل">

<input type="file">

<button class="btn" onclick="done()">تأكيد الشحن</button>

<div class="success" id="msg">
✅ تم استلام طلبك بنجاح! سيتم التفعيل خلال دقائق
</div>

</div>

<script>
function order(name){
    document.getElementById("pay").style.display="block";
    document.getElementById("selected").innerText="الباقة: "+name;
    window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function copy(){
    let x=document.getElementById("num");
    x.select();
    document.execCommand("copy");
    alert("تم النسخ");
}

function done(){
    document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
