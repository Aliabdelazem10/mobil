<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عروض الشبكات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .network-section { margin-bottom: 50px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* ترويسة الشبكة */
        .network-header { text-align: center; margin-bottom: 30px; }
        .network-header img { max-width: 150px; height: auto; }
        
        /* شبكة العروض */
        .offers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .offer-card { border: 2px solid #eee; border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s; }
        .offer-card:hover { transform: translateY(-5px); }

        /* ألوان الشركات */
        .vodafone { border-top: 8px solid #e60000; }
        .vodafone button { background-color: #e60000; color: white; }
        
        .orange { border-top: 8px solid #ff6600; }
        .orange button { background-color: #ff6600; color: white; }

        .etisalat { border-top: 8px solid #719906; }
        .etisalat button { background-color: #719906; color: white; }

        .we { border-top: 8px solid #5d2d91; }
        .we button { background-color: #5d2d91; color: white; }

        .offer-card h3 { margin: 10px 0; color: #333; }
        .price { font-size: 24px; font-weight: bold; color: #000; margin: 10px 0; }
        
        button { border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        
        /* تنسيق الفورم (النافذة) */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 90%; max-width: 400px; border-radius: 10px; position: relative; }
        .modal-content input, .modal-content button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">

    <div class="network-section">
        <div class="network-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Vodafone_icon.svg" alt="Vodafone">
            <h2>عروض فودافون</h2>
        </div>
        <div class="offers-grid">
            <div class="offer-card vodafone">
                <h3>باقة إكستريم 100</h3>
                <div class="price">100 ج.م</div>
                <p>10,000 ميجا بايت</p>
                <button onclick="openModal('باقة فودافون 100')">شحن الباقة</button>
            </div>
            </div>
    </div>

    <div class="network-section">
        <div class="network-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Etisalat_Logo.svg" alt="Etisalat">
            <h2>عروض اتصالات</h2>
        </div>
        <div class="offers-grid">
            <div class="offer-card etisalat">
                <h3>حكاية 50</h3>
                <div class="price">50 ج.م</div>
                <p>1500 دقيقة لكل الشبكات</p>
                <button onclick="openModal('حكاية 50')">شحن الباقة</button>
            </div>
        </div>
    </div>

</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3 id="selectedPackage">شحن الباقة</h3>
        <p style="color: red; font-weight: bold;">رقم الكاش للتحويل: 010XXXXXXXX</p>
        <form id="orderForm">
            <input type="text" placeholder="رقم الموبايل المراد تفعيل الباقة عليه" required>
            <input type="text" placeholder="الرقم الذي قمت بالتحويل منه" required>
            <label>ارفق صورة التحويل (سكرين شوت):</label>
            <input type="file" accept="image/*" required>
            <button type="submit" style="background: #28a745; color: white;">تأكيد الطلب</button>
            <button type="button" onclick="closeModal()" style="background: #ccc;">إلغاء</button>
        </form>
    </div>
</div>

<script>
    function openModal(packageName) {
        document.getElementById('selectedPackage').innerText = "شحن: " + packageName;
        document.getElementById('paymentModal').style.display = "block";
    }
    function closeModal() {
        document.getElementById('paymentModal').style.display = "none";
    }
</script>

</body>
</html>
