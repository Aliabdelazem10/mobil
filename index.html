<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشحن الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --vodafone: #e60000;
            --etisalat: #006f3a;
            --orange: #ff6600;
            --we: #5c2d91;
            --bg-color: #f0f4f8;
            --box-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .charge-container {
            background-color: var(--box-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            box-sizing: border-box;
            margin: 20px;
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .section-label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        /* اختيار الشبكة */
        .network-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .network-option {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 16px;
        }

        .network-option:hover {
            transform: translateY(-2px);
        }

        /* الألوان عند الاختيار */
        .network-option.active[data-network="vodafone"] { border-color: var(--vodafone); background-color: #ffe6e6; color: var(--vodafone); }
        .network-option.active[data-network="etisalat"] { border-color: var(--etisalat); background-color: #e6f3eb; color: var(--etisalat); }
        .network-option.active[data-network="orange"] { border-color: var(--orange); background-color: #fff0e6; color: var(--orange); }
        .network-option.active[data-network="we"] { border-color: var(--we); background-color: #f2eaf5; color: var(--we); }

        /* حقول الإدخال */
        .input-group {
            margin-bottom: 25px;
        }

        input[type="tel"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s;
            outline: none;
            background-color: #f8f9fa;
        }

        input[type="tel"]:focus, select:focus {
            border-color: #3498db;
            background-color: #fff;
        }

        /* زر الإرسال */
        .btn-submit {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .btn-submit:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-submit:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* النافذة المنبثقة (Modal) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 80px; height: 80px;
            background-color: #2ecc71;
            color: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
        }

        .receipt-details {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: right;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .receipt-row:last-child {
            border-bottom: none; margin-bottom: 0; padding-bottom: 0;
        }

        .btn-close {
            background-color: #34495e; color: white; border: none;
            padding: 12px 30px; font-size: 16px; font-weight: 600;
            border-radius: 10px; cursor: pointer; font-family: 'Cairo', sans-serif;
            width: 100%;
        }

        /* استجابة للموبايل */
        @media(max-width: 480px) {
            .network-selector { grid-template-columns: repeat(2, 1fr); }
            .charge-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="charge-container">
        <h2 class="title">بوابة شحن الباقات</h2>

        <label class="section-label">1. اختر الشبكة:</label>
        <div class="network-selector" id="networkSelector">
            <div class="network-option" data-network="vodafone">فودافون</div>
            <div class="network-option" data-network="etisalat">اتصالات</div>
            <div class="network-option" data-network="orange">أورانج</div>
            <div class="network-option" data-network="we">وي (WE)</div>
        </div>

        <div class="input-group">
            <label class="section-label" for="phoneNumber">2. رقم الموبايل:</label>
            <input type="tel" id="phoneNumber" placeholder="أدخل رقم الموبايل هنا..." maxlength="11">
        </div>

        <div class="input-group">
            <label class="section-label" for="packageSelect">3. اختر الباقة والوحدات:</label>
            <select id="packageSelect" disabled>
                <option value="">رجاءً اختر الشبكة أولاً...</option>
            </select>
        </div>

        <button class="btn-submit" id="submitBtn" disabled>إرسال للرقم</button>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2 style="margin: 0 0 10px 0; color: #2c3e50;">تم الشحن بنجاح!</h2>
            
            <div class="receipt-details">
                <div class="receipt-row">
                    <span style="color: var(--text-muted);">الشبكة:</span>
                    <strong id="receiptNetwork">---</strong>
                </div>
                <div class="receipt-row">
                    <span style="color: var(--text-muted);">رقم الموبايل:</span>
                    <strong id="receiptNumber">---</strong>
                </div>
                <div class="receipt-row">
                    <span style="color: var(--text-muted);">تفاصيل الباقة:</span>
                    <strong id="receiptPackage" style="text-align: left; max-width: 60%;">---</strong>
                </div>
                <div class="receipt-row" style="margin-top: 10px; color: #e74c3c; font-size: 12px; justify-content: center;">
                    (عملية وهمية للمحاكاة فقط)
                </div>
            </div>

            <button class="btn-close" onclick="closeModal()">إغلاق ورجوع</button>
        </div>
    </div>

    <script>
        // قاعدة بيانات الباقات
        const packagesData = {
            vodafone: [
                { id: "v1", text: "40 جيجا + 7500 وحدة - 125 ج.م (3 شهور)" },
                { id: "v2", text: "32 جيجا + 9000 وحدة - 105 ج.م (شهرين)" },
                { id: "v3", text: "17 جيجا + 5000 وحدة - 80 ج.م (شهر)" }
            ],
            etisalat: [
                { id: "e1", text: "70 جيجا + 9000 وحدة - 150 ج.م (3 شهور)" },
                { id: "e2", text: "50 جيجا + 6500 وحدة - 115 ج.م (3 شهور)" },
                { id: "e3", text: "25 جيجا + 4300 وحدة - 85 ج.م (شهر)" }
            ],
            orange: [
                { id: "o1", text: "70 جيجا + 4500 وحدة - 140 ج.م (3 شهور)" },
                { id: "o2", text: "50 جيجا + 4600 وحدة - 120 ج.م (3 شهور)" },
                { id: "o3", text: "35 جيجا + 5000 وحدة - 95 ج.م (3 شهور)" }
            ],
            we: [
                { id: "w1", text: "65 جيجا + 5500 وحدة - 190 ج.م (3 شهور)" },
                { id: "w2", text: "47 جيجا + 4900 وحدة - 120 ج.م (3 شهور)" },
                { id: "w3", text: "16 جيجا + 3500 وحدة - 85 ج.م (شهرين)" }
            ]
        };

        const networkOptions = document.querySelectorAll('.network-option');
        const packageSelect = document.getElementById('packageSelect');
        const phoneNumber = document.getElementById('phoneNumber');
        const submitBtn = document.getElementById('submitBtn');
        let selectedNetwork = '';
        let networkNameArabic = '';

        // تفاعل اختيار الشبكة
        networkOptions.forEach(option => {
            option.addEventListener('click', function() {
                // إزالة التفعيل من الكل
                networkOptions.forEach(opt => opt.classList.remove('active'));
                // تفعيل الحالي
                this.classList.add('active');
                
                selectedNetwork = this.getAttribute('data-network');
                networkNameArabic = this.innerText;

                // تحديث القائمة المنسدلة للباقات
                updatePackages(selectedNetwork);
                checkFormValidity();
            });
        });

        // دالة تحديث الباقات بناءً على الشبكة
        function updatePackages(network) {
            packageSelect.innerHTML = '<option value="">اختر الباقة المناسبة...</option>';
            packageSelect.disabled = false;

            packagesData[network].forEach(pkg => {
                const option = document.createElement('option');
                option.value = pkg.text;
                option.textContent = pkg.text;
                packageSelect.appendChild(option);
            });
        }

        // مراقبة حقول الإدخال لتفعيل زر الإرسال
        phoneNumber.addEventListener('input', checkFormValidity);
        packageSelect.addEventListener('change', checkFormValidity);

        function checkFormValidity() {
            if (selectedNetwork !== '' && phoneNumber.value.length >= 10 && packageSelect.value !== '') {
                submitBtn.disabled = false;
                
                // تغيير لون الزر حسب الشبكة
                if(selectedNetwork === 'vodafone') submitBtn.style.backgroundColor = 'var(--vodafone)';
                if(selectedNetwork === 'etisalat') submitBtn.style.backgroundColor = 'var(--etisalat)';
                if(selectedNetwork === 'orange') submitBtn.style.backgroundColor = 'var(--orange)';
                if(selectedNetwork === 'we') submitBtn.style.backgroundColor = 'var(--we)';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.backgroundColor = '#bdc3c7';
            }
        }

        // عملية الإرسال الوهمي
        submitBtn.addEventListener('click', function() {
            document.getElementById('receiptNetwork').innerText = networkNameArabic;
            document.getElementById('receiptNumber').innerText = phoneNumber.value;
            document.getElementById('receiptPackage').innerText = packageSelect.value;
            
            document.getElementById('successModal').style.display = 'flex';
        });

        // إغلاق النافذة المنبثقة وإعادة تعيين النموذج
        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            phoneNumber.value = '';
            packageSelect.selectedIndex = 0;
            checkFormValidity();
        }
    </script>
</body>
</html>
